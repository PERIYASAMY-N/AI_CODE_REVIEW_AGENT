version: '3.8'

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: aidev
      POSTGRES_PASSWORD: aidevpassword
      POSTGRES_DB: aidevdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidev -d aidevdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aidev:aidevpassword@database:5432/aidevdb
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-use-a-32-char-secret}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GROQ_API_KEY: ${GROQ_API_KEY}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}  # never use decommissioned models here
      FRONTEND_URL: http://localhost
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:

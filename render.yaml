services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: ai-code-review-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-code-review-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: GROQ_API_KEY
        sync: false                  # Set manually in Render dashboard
      - key: AI_MODEL
        value: "llama-3.3-70b-versatile"
      - key: FRONTEND_URL
        sync: false                  # Set to your frontend URL after deploy

  # ── Frontend (React/Vite → static site) ─────────────────────────────────────
  - type: web
    name: ai-code-review-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html      # React Router SPA fallback
    envVars:
      - key: VITE_API_URL
        sync: false                   # Set to your backend URL after deploy

# ── PostgreSQL database ──────────────────────────────────────────────────────
databases:
  - name: ai-code-review-db
    databaseName: aidevdb
    user: aidev
    plan: free
